name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: test_jwt_access_secret_32_chars_minimum_value
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_32_chars_minimum_value
      THROTTLE_LIMIT: 100
      THROTTLE_TTL_MS: 60000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opside_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint:check

      - name: Unit tests
        run: npm test -- --runInBand

      - name: API tests (e2e smoke)
        run: npm run test:api -- --runInBand

      - name: Build
        run: npm run build

  frontend:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Frontend tests
        run: npm run test:ci

      - name: Build
        run: npm run build
